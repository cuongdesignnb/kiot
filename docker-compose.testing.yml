# Docker Compose - MySQL test cho dự án KiotViet Clone
# Dùng riêng cho automated testing, KHÔNG phải production.
#
# Chạy:  docker compose -f docker-compose.testing.yml up -d
# Dừng:  docker compose -f docker-compose.testing.yml down
# Xóa data: docker compose -f docker-compose.testing.yml down -v
#
# Host port: 3319 (đã kiểm tra không trùng dự án khác)

services:
  mysql_test:
    image: mysql:8.0
    container_name: sales_mysql_test
    restart: unless-stopped
    ports:
      - "3319:3306"
    environment:
      MYSQL_DATABASE: sales_test
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_password
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_test_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_test_data:
