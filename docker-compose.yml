version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sales_mysql_test
    restart: unless-stopped
    ports:
      - "3319:3306"
    environment:
      MYSQL_DATABASE: sales_test
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_password
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_test_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kiotviet-app-clone
    ports:
      - "8081:8080"
    volumes:
      - ./storage:/var/www/storage
    env_file:
      - .env.docker
    depends_on:
      - mysql
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: sales_phpmyadmin
    restart: unless-stopped
    ports:
      - "8088:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql

volumes:
  mysql_test_data:
